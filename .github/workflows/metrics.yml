name: Update Metrics

on:
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:

jobs:
  metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          filename: profile/metrics.svg
          base: header, activity, community, repositories
          base_indepth: yes
          config_display: large
          config_timezone: Asia/Kolkata